<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="../Styles/principal.css">
    <link rel="stylesheet" href="/fontawesome-free-7.2.0-web/css/all.css">
</head>
<body>

        <div class="navBar">

                </div>

                <div class="nav-search">
                    <form action="/buscar" method="GET">

                        <button type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </div>

                <ul class="nav-links">
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Catálogo</a></li>
                    <li><a href="#">Mi Cuenta</a></li>
                </ul>
            </nav>
        </div>

        <div class="content">
    <h2 class="section-title">Catálogo de Libros</h2>
    
    <div class="books-grid">
        <p>Cargando libros desde la base de datos...</p> 
    </div>
</div>

        <div class="foot">
            <h1>Instituto Tecnologico Superior de Poza Rica.</h1>
            <p>ISIC</p>
        </div>
    </div>
    <script src="/fetch-consumo/libros-fetch.js"></script>

</html>
